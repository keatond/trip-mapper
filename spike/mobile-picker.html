<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Picker EXIF-GPS Probe — Trip Mapper</title>
  <style>
    :root { color-scheme: dark; }
    body { font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
           margin: 0; background: #0f172a; color: #e2e8f0; }
    header { padding: 16px 18px; background: #1e293b; border-bottom: 1px solid #334155; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: #94a3b8; font-size: 13px; }
    main { padding: 18px; max-width: 900px; }

    /* Big, finger-friendly picker so the native sheet opens on one tap. */
    .pick {
      display: block; width: 100%; min-height: 56px; padding: 16px;
      font: inherit; font-weight: 600; text-align: center;
      border-radius: 12px; border: 2px solid #2563eb; background: #2563eb; color: #fff;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .pick:active { background: #1d4ed8; }
    input[type=file] { position: absolute; width: 1px; height: 1px; opacity: 0; }

    .counts { margin: 14px 0 6px; font-size: 13px; color: #94a3b8; }
    .toolbar { margin: 10px 0; display: flex; gap: 8px; flex-wrap: wrap; }
    .toolbar button { font: inherit; padding: 10px 14px; min-height: 44px; border-radius: 8px;
      border: 1px solid #475569; background: #334155; color: #e2e8f0; cursor: pointer; }
    .toolbar button:disabled { opacity: .5; }

    .card { border: 1px solid #334155; border-radius: 10px; background: #1e293b;
            padding: 12px 14px; margin: 10px 0; }
    .card h2 { font-size: 14px; margin: 0 0 8px; word-break: break-all; }
    .grid { display: grid; grid-template-columns: max-content 1fr; gap: 4px 12px; font-size: 13px; }
    .k { color: #94a3b8; }
    .v { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
    .gps-ok { color: #4ade80; font-weight: 700; }
    .gps-missing { color: #f87171; font-weight: 700; }
    .warn { color: #fbbf24; }

    textarea { width: 100%; margin-top: 12px; background: #0b1220; color: #cbd5e1;
      border: 1px solid #334155; border-radius: 8px; padding: 10px;
      font: 12px/1.5 ui-monospace, monospace; white-space: pre; min-height: 200px; }
  </style>
</head>
<body>
  <header>
    <h1>Mobile Picker EXIF-GPS Probe</h1>
    <div class="sub">Pick 2&ndash;3 photos you <em>know</em> are geotagged. This reads each file's
      EXIF <strong>in your browser</strong> and shows whether GPS survived the picker.
      Nothing is uploaded.</div>
  </header>

  <main>
    <label class="pick" for="fileInput" id="pickLabel">Add photos from your device</label>
    <input type="file" id="fileInput" accept="image/*" multiple />

    <div class="counts" id="counts">No photos selected yet.</div>

    <div class="toolbar">
      <button id="copyBtn" disabled>Copy results as text</button>
      <span id="copyNote" class="sub"></span>
    </div>

    <div id="results"></div>

    <textarea id="report" readonly placeholder="(pick photos, then tap &lsquo;Copy results as text&rsquo; &mdash; paste the block back)"></textarea>
  </main>

  <!-- exifr full build: parses JPEG and HEIC/HEIF EXIF (incl. GPS IFD). -->
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
  <script>
    const fileInput = document.getElementById("fileInput");
    const results   = document.getElementById("results");
    const counts    = document.getElementById("counts");
    const report    = document.getElementById("report");
    const copyBtn   = document.getElementById("copyBtn");
    const copyNote  = document.getElementById("copyNote");

    let rows = []; // collected per-file findings, for the copy block

    fileInput.addEventListener("change", async (e) => {
      const files = Array.from(e.target.files || []);
      results.innerHTML = "";
      rows = [];
      report.value = "";
      copyBtn.disabled = true;

      if (!files.length) { counts.textContent = "No photos selected yet."; return; }
      counts.textContent = `Reading ${files.length} photo${files.length === 1 ? "" : "s"}…`;

      let gpsCount = 0;
      for (const file of files) {
        const row = await probe(file);
        rows.push(row);
        renderCard(row);
        if (row.gps) gpsCount++;
      }

      counts.innerHTML =
        `${files.length} file${files.length === 1 ? "" : "s"} · ` +
        `<span class="${gpsCount ? "gps-ok" : "gps-missing"}">${gpsCount} with GPS</span>, ` +
        `${files.length - gpsCount} GPS=MISSING.`;

      report.value = buildReport(rows);
      copyBtn.disabled = false;
    });

    async function probe(file) {
      const row = {
        name: file.name || "(no name)",
        type: file.type || "(empty MIME)",
        size: file.size,
        dims: null,
        time: null,
        gps: null,        // {lat, lon} or null
        error: null,
      };

      // EXIF: GPS + timestamp + embedded dimensions.
      let data = null;
      try {
        data = await window.exifr.parse(file, { gps: true });
      } catch (err) {
        row.error = "EXIF parse failed: " + err.message;
      }

      if (data) {
        if (data.latitude != null && data.longitude != null &&
            !Number.isNaN(data.latitude) && !Number.isNaN(data.longitude)) {
          row.gps = { lat: data.latitude, lon: data.longitude };
        }
        const ts = data.DateTimeOriginal || data.CreateDate || data.ModifyDate;
        if (ts instanceof Date && !Number.isNaN(ts.getTime())) {
          row.time = ts.toISOString();
        }
        const w = data.ExifImageWidth || data.ImageWidth || data.PixelXDimension;
        const h = data.ExifImageHeight || data.ImageHeight || data.PixelYDimension;
        if (w && h) row.dims = `${w}×${h}`;
      }

      // Dimensions fallback: decode the actual pixels (works for what the
      // browser can render; HEIC may decode on iOS Safari, may fail on Chrome).
      if (!row.dims) {
        row.dims = await pixelDims(file);
      }

      return row;
    }

    function pixelDims(file) {
      return new Promise((resolve) => {
        let settled = false;
        const done = (v) => { if (!settled) { settled = true; resolve(v); } };
        try {
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => { const d = `${img.naturalWidth}×${img.naturalHeight}`;
                               URL.revokeObjectURL(url); done(d); };
          img.onerror = () => { URL.revokeObjectURL(url); done("(can't decode)"); };
          img.src = url;
          setTimeout(() => { URL.revokeObjectURL(url); done("(decode timeout)"); }, 4000);
        } catch { done("(unavailable)"); }
      });
    }

    function renderCard(row) {
      const card = document.createElement("div");
      card.className = "card";

      const gpsHtml = row.gps
        ? `<span class="gps-ok">${row.gps.lat.toFixed(6)}, ${row.gps.lon.toFixed(6)}</span>`
        : `<span class="gps-missing">GPS=MISSING</span>`;

      card.innerHTML =
        `<h2>${escapeHtml(row.name)}</h2>` +
        `<div class="grid">` +
          kv("MIME type", escapeHtml(row.type)) +
          kv("Size", `${row.size.toLocaleString()} bytes (${(row.size / 1024).toFixed(0)} KB)`) +
          kv("Dimensions", escapeHtml(row.dims || "—")) +
          kv("DateTimeOriginal", escapeHtml(row.time || "—")) +
          kv("GPS lat/lon", gpsHtml) +
          (row.error ? kv("Note", `<span class="warn">${escapeHtml(row.error)}</span>`) : "") +
        `</div>`;
      results.appendChild(card);
    }

    function kv(k, vHtml) {
      return `<div class="k">${k}</div><div class="v">${vHtml}</div>`;
    }

    function buildReport(rows) {
      const lines = [];
      lines.push(`# Mobile picker EXIF-GPS probe — ${new Date().toISOString()}`);
      lines.push(`# UA: ${navigator.userAgent}`);
      lines.push(`# ${rows.length} file(s)`);
      lines.push("");
      rows.forEach((r, i) => {
        const gps = r.gps ? `${r.gps.lat.toFixed(6)}, ${r.gps.lon.toFixed(6)}` : "GPS=MISSING";
        lines.push(`${i + 1}. ${r.name}`);
        lines.push(`     MIME=${r.type} | size=${r.size}B | dims=${r.dims || "-"}`);
        lines.push(`     time=${r.time || "-"} | GPS: ${gps}` + (r.error ? ` | ${r.error}` : ""));
      });
      const withGps = rows.filter((r) => r.gps).length;
      lines.push("");
      lines.push(`SUMMARY: ${withGps}/${rows.length} with GPS → ` +
                 (withGps ? "GPS PRESENT on this platform" : "GPS=MISSING on this platform"));
      return lines.join("\n");
    }

    copyBtn.addEventListener("click", async () => {
      report.select();
      try {
        await navigator.clipboard.writeText(report.value);
        copyNote.textContent = "Copied ✓";
      } catch {
        document.execCommand && document.execCommand("copy");
        copyNote.textContent = "Selected — copy manually";
      }
      setTimeout(() => (copyNote.textContent = ""), 2500);
    });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
  </script>
</body>
</html>
