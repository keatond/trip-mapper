<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Mapper</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />

  <!-- Leaflet.markercluster CSS (zoom-based marker clustering) -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        integrity="sha256-YU3qCpj/P06tdPBJGPax0bm6Q1wltfwjsho5TR4+TYc="
        crossorigin="" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        integrity="sha256-YSWCMtmNZNwqex4CEw1nQhvFub2lmU7vcCKP+XVwwXA="
        crossorigin="" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Trip Mapper</h1>
    <p class="tagline">Drop geotagged photos &rarr; see your trips on a map.</p>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div id="dropzone" class="dropzone">
        <p class="dropzone-title">Drag &amp; drop photos or a .zip here</p>
        <p class="dropzone-hint">or click to choose files &mdash; a Google Photos download .zip works too</p>
        <input type="file" id="fileInput" accept="image/*,.zip,application/zip,application/x-zip-compressed" multiple hidden />
      </div>
      <p id="status" class="status" role="status" aria-live="polite"></p>
      <ul id="skipList" class="skip-list" aria-live="polite" hidden></ul>
      <ul id="tripList" class="trip-list"></ul>
    </aside>

    <main class="map-pane">
      <div id="map"></div>
    </main>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Leaflet.markercluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
          integrity="sha256-Hk4dIpcqOSb0hZjgyvFOP+cEmDXUKKNE/tT542ZbNQg="
          crossorigin=""></script>

  <!-- exifr (EXIF parsing) -->
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>

  <!-- JSZip (client-side .zip extraction of Google Photos download bundles) -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"
          integrity="sha256-rMfkFFWoB2W1/Zx+4bgHim0WC7vKRVrq6FTeZclH1Z4="
          crossorigin=""></script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
