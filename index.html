<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Mapper</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 2a9 9 0 0 0-9 9c0 6.5 9 19 9 19s9-12.5 9-19a9 9 0 0 0-9-9z' fill='%23c2410c'/%3E%3Ccircle cx='16' cy='11' r='3.6' fill='%23fff'/%3E%3C/svg%3E">

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />

  <!-- Leaflet.markercluster CSS (zoom-based marker clustering) -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        integrity="sha256-YU3qCpj/P06tdPBJGPax0bm6Q1wltfwjsho5TR4+TYc="
        crossorigin="" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        integrity="sha256-YSWCMtmNZNwqex4CEw1nQhvFub2lmU7vcCKP+XVwwXA="
        crossorigin="" />

  <!-- Display typeface: Fraunces (soft serif) for brand + trip titles.
       Degrades to Georgia/serif if the CDN is unreachable. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap">

  <!-- Design system tokens first, then component stylesheets that consume them. -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/shell.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/map.css" />
  <link rel="stylesheet" href="css/states.css" />
  <link rel="stylesheet" href="css/empty.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="28" height="28" fill="none">
          <path d="M7 24c0-6 5-9 5-14a5 5 0 0 1 10 0c0 5-5 8-5 14"
                stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                stroke-dasharray="0.1 5" />
          <circle cx="22" cy="9" r="3.4" fill="currentColor" />
          <circle cx="9" cy="24" r="2.4" fill="currentColor" opacity="0.55" />
        </svg>
      </span>
      <div class="brand-text">
        <h1 class="brand-title">Trip Mapper</h1>
        <p class="tagline">Turn geotagged photos into a map of your travels.</p>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div id="dropzone" class="dropzone">
        <span class="dropzone__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3" />
            <circle cx="8.5" cy="8.5" r="1.6" />
            <path d="M21 15l-5-5L5 21" />
          </svg>
        </span>
        <p class="dropzone-title">Drag &amp; drop photos or a .zip</p>
        <p class="dropzone-hint">or click to choose &mdash; a Google Photos download .zip works too</p>
        <input type="file" id="fileInput" accept="image/*,.zip,application/zip,application/x-zip-compressed" multiple hidden />
      </div>

      <!-- Demo banner: shown while the bundled sample trip is on screen (wired in 3.2). -->
      <div id="demoBanner" class="demo-banner" hidden></div>

      <div id="status" class="status" role="status" aria-live="polite"></div>
      <ul id="skipList" class="skip-list" aria-live="polite" hidden></ul>
      <ul id="tripList" class="trip-list"></ul>
    </aside>

    <main class="map-pane">
      <div id="map"></div>
      <!-- Rich empty state, overlaid on the map pane when no trip is loaded (wired in 3.2). -->
      <div id="emptyState" class="empty-state" hidden></div>
    </main>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Leaflet.markercluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
          integrity="sha256-Hk4dIpcqOSb0hZjgyvFOP+cEmDXUKKNE/tT542ZbNQg="
          crossorigin=""></script>

  <!-- exifr (EXIF parsing) -->
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>

  <!-- JSZip (client-side .zip extraction of Google Photos download bundles) -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"
          integrity="sha256-rMfkFFWoB2W1/Zx+4bgHim0WC7vKRVrq6FTeZclH1Z4="
          crossorigin=""></script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
